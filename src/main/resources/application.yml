spring:
  application:
    name: task-catalog
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:task_catalog}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  flyway:
    enabled: true
  jackson:
    time-zone: UTC

server:
  port: ${SERVER_PORT:8080}
  error:
    include-message: never
